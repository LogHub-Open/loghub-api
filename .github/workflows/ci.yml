name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      # NOTE: ./mvnw is broken in this repo (not executable, and
      # .mvn/wrapper/maven-wrapper.properties isn't committed) - see the
      # separate issue about the Maven wrapper. Using the runner's system
      # Maven instead until that's fixed.
      - run: mvn -B clean verify
